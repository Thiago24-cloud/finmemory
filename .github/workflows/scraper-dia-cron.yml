name: Scraper DIA — Cron Semanal

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      max_batches:
        description: 'Quantos lotes rodar (padrão 18 ≈ Grande SP com batch 10)'
        required: false
        default: '18'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Scraper DIA — todos os lotes Grande SP
        env:
          CONSUMER_APP_URL: ${{ secrets.CONSUMER_APP_URL }}
          FINMEMORY_APP_URL: ${{ secrets.FINMEMORY_APP_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          RETAILER_APP_URL: ${{ secrets.RETAILER_APP_URL }}
          PARCEIROS_APP_URL: ${{ secrets.PARCEIROS_APP_URL }}
          DIA_IMPORT_SECRET: ${{ secrets.DIA_IMPORT_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MAX_BATCHES: ${{ github.event.inputs.max_batches || '18' }}
        run: |
          set -euo pipefail
          BASE_URL="${CONSUMER_APP_URL:-${FINMEMORY_APP_URL:-${APP_URL:-}}}"
          RETAILER_URL="${RETAILER_APP_URL:-${PARCEIROS_APP_URL:-}}"
          SECRET="${DIA_IMPORT_SECRET:-${CRON_SECRET:-}}"
          if [ -z "$BASE_URL" ]; then
            echo "::error::Defina CONSUMER_APP_URL=https://finmemory.com.br (scrapers ficam no app consumidor)."
            exit 1
          fi
          if [ -z "$SECRET" ]; then
            echo "::error::Defina DIA_IMPORT_SECRET ou CRON_SECRET (mesmo valor do Cloud Run consumer)."
            exit 1
          fi
          BASE_URL="${BASE_URL%/}"
          if echo "$BASE_URL" | grep -qiE 'parceiros\.finmemory|finmemory-retailer|finmemory-parceiros'; then
            echo "::error::URL do scraper aponta para o app lojista ($BASE_URL)."
            echo "::error::Use CONSUMER_APP_URL=https://finmemory.com.br — o mapa do parceiros usa o mesmo banco."
            exit 1
          fi
          echo "Consumer (scrapers): $BASE_URL"
          [ -n "$RETAILER_URL" ] && echo "Parceiros (health only): ${RETAILER_URL%/}"
          BATCH_SIZE=10
          echo "Iniciando scraper DIA Grande SP — $(date -u) — até ${MAX_BATCHES} lotes de ${BATCH_SIZE} lojas"
          total_inserted=0
          total_ok=0
          for batch in $(seq 0 $((MAX_BATCHES - 1))); do
            echo ""
            echo "========== Lote ${batch} =========="
            response=$(curl -sS -w "\n%{http_code}" \
              -X POST "${BASE_URL}/api/scraper/dia" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${SECRET}" \
              -d "{\"batchSize\":${BATCH_SIZE},\"batchIndex\":${batch},\"concurrency\":2,\"storeDelayMs\":400}" \
              --max-time 1200) || {
              echo "::error::curl falhou no lote ${batch}"
              exit 1
            }
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n -1)
            echo "HTTP ${http_code}"
            echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"
            if [ "$http_code" = "404" ]; then
              echo "::error::HTTP 404 — CONSUMER_APP_URL deve ser finmemory.com.br (não parceiros)."
              exit 1
            fi
            if [ "$http_code" != "200" ]; then
              echo "::error::Lote ${batch} retornou HTTP ${http_code}"
              exit 1
            fi
            inserted=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum((r.get('inserted') or 0) for r in (d.get('results') or [])))" 2>/dev/null || echo "0")
            stores_ok=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('storesOk',0))" 2>/dev/null || echo "0")
            total_inserted=$((total_inserted + inserted))
            total_ok=$((total_ok + stores_ok))
            echo "Lote ${batch}: storesOk=${stores_ok} inserted=${inserted}"
            sleep 5
          done
          echo ""
          echo "Concluído: storesOk acumulado=${total_ok} | price_points inseridos≈${total_inserted}"
          if [ -n "$RETAILER_URL" ]; then
            RURL="${RETAILER_URL%/}"
            rh=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "${RURL}/api/health" || echo "000")
            echo "Parceiros ${RURL}/api/health → HTTP ${rh}"
            if [ "$rh" != "200" ]; then
              echo "::warning::App parceiros sem health 200 — mapa no parceiros redireciona para o consumer."
            fi
          fi

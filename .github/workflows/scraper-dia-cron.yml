name: Scraper DIA — Cron Semanal

on:
  schedule:
    # Todo domingo às 02:00 BRT (= 05:00 UTC, fuso America/Sao_Paulo é UTC-3)
    - cron: '0 5 * * 0'
  workflow_dispatch: # permite rodar manualmente no GitHub Actions UI

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Chamar POST /api/scraper/dia
        run: |
          echo "Iniciando scraper DIA — $(date -u)"
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/scraper/dia" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.DIA_IMPORT_SECRET }}" \
            -d '{}' \
            --max-time 900)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP $http_code"
          echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Scraper retornou HTTP $http_code"
            exit 1
          fi
          success=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',''))" 2>/dev/null)
          stores_ok=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('storesOk',0))" 2>/dev/null)
          stores_total=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('storesProcessed',0))" 2>/dev/null)
          echo "success=$success | storesOk=$stores_ok/$stores_total"
          if [ "$success" != "True" ] && [ "$success" != "true" ]; then
            echo "::warning::success=false — verifique lojas com erro acima"
          fi

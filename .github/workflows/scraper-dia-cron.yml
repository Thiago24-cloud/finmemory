# Domingo 02:00 BRT (05:00 UTC): scraper DIA Grande SP → mapa automático (produção).
# A API Anthropic roda no Cloud Run (ANTHROPIC_API_KEY lá). O GitHub só dispara HTTP.
name: Scraper DIA — Cron Semanal

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      max_batches:
        description: 'Quantos lotes rodar (padrão 8 ≈ todas as lojas Grande SP)'
        required: false
        default: '8'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Scraper DIA — todos os lotes Grande SP
        env:
          APP_URL: ${{ secrets.APP_URL }}
          FINMEMORY_APP_URL: ${{ secrets.FINMEMORY_APP_URL }}
          DIA_IMPORT_SECRET: ${{ secrets.DIA_IMPORT_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MAX_BATCHES: ${{ github.event.inputs.max_batches || '8' }}
        run: |
          set -euo pipefail
          BASE_URL="${APP_URL:-${FINMEMORY_APP_URL:-}}"
          SECRET="${DIA_IMPORT_SECRET:-${CRON_SECRET:-}}"
          if [ -z "$BASE_URL" ]; then
            echo "::error::Defina o secret APP_URL ou FINMEMORY_APP_URL no GitHub (Settings → Secrets → Actions)."
            exit 1
          fi
          if [ -z "$SECRET" ]; then
            echo "::error::Defina DIA_IMPORT_SECRET ou CRON_SECRET (mesmo valor do Cloud Run)."
            exit 1
          fi
          BASE_URL="${BASE_URL%/}"
          BATCH_SIZE=25
          echo "Iniciando scraper DIA Grande SP — $(date -u) — até ${MAX_BATCHES} lotes de ${BATCH_SIZE} lojas"
          total_inserted=0
          total_ok=0
          for batch in $(seq 0 $((MAX_BATCHES - 1))); do
            echo ""
            echo "========== Lote ${batch} =========="
            response=$(curl -sS -w "\n%{http_code}" \
              -X POST "${BASE_URL}/api/scraper/dia" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${SECRET}" \
              -d "{\"batchSize\":${BATCH_SIZE},\"batchIndex\":${batch},\"concurrency\":2,\"storeDelayMs\":400}" \
              --max-time 1200) || {
              echo "::error::curl falhou no lote ${batch}"
              exit 1
            }
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n -1)
            echo "HTTP ${http_code}"
            echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"
            if [ "$http_code" != "200" ]; then
              echo "::error::Lote ${batch} retornou HTTP ${http_code}"
              exit 1
            fi
            inserted=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum((r.get('inserted') or 0) for r in (d.get('results') or [])))" 2>/dev/null || echo "0")
            stores_ok=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('storesOk',0))" 2>/dev/null || echo "0")
            total_inserted=$((total_inserted + inserted))
            total_ok=$((total_ok + stores_ok))
            echo "Lote ${batch}: storesOk=${stores_ok} inserted=${inserted}"
            sleep 5
          done
          echo ""
          echo "Concluído: storesOk acumulado=${total_ok} | price_points inseridos≈${total_inserted}"

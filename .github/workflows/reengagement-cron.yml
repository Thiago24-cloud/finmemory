# Cron diário: push para usuários inativos 48h+ (requer CRON_SECRET no GitHub + Cloud Run)
name: Reengagement inactive users

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: POST reengagement-inactive
        env:
          APP_URL: ${{ secrets.FINMEMORY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Defina secrets FINMEMORY_APP_URL e CRON_SECRET no repositório."
            exit 1
          fi
          curl -fsS -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/reengagement-inactive"

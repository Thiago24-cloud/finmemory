apply plugin: 'com.android.application'

import java.util.Properties
import java.io.FileInputStream

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreExampleFile = rootProject.file("keystore.properties.example")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
} else if (keystoreExampleFile.exists()) {
    // Local fallback to support teams that keep secrets in a local example file.
    keystoreProperties.load(new FileInputStream(keystoreExampleFile))
}

def releaseStoreFile = keystoreProperties.getProperty("storeFile")
        ?: System.getenv("FM_UPLOAD_STORE_FILE")
        ?: project.findProperty("FM_UPLOAD_STORE_FILE")
def releaseStorePassword = keystoreProperties.getProperty("storePassword")
        ?: System.getenv("FM_UPLOAD_STORE_PASSWORD")
        ?: project.findProperty("FM_UPLOAD_STORE_PASSWORD")
def releaseKeyAlias = keystoreProperties.getProperty("keyAlias")
        ?: System.getenv("FM_UPLOAD_KEY_ALIAS")
        ?: project.findProperty("FM_UPLOAD_KEY_ALIAS")
def releaseKeyPassword = keystoreProperties.getProperty("keyPassword")
        ?: System.getenv("FM_UPLOAD_KEY_PASSWORD")
        ?: project.findProperty("FM_UPLOAD_KEY_PASSWORD")
def releaseStoreFileRef = null
if (releaseStoreFile) {
    def moduleRelative = file(releaseStoreFile)
    def moduleNormalized = file(
            releaseStoreFile
                    .replace("\\", "/")
                    .replaceFirst("^app/", "")
    )
    def rootRelative = rootProject.file(releaseStoreFile)
    def absolutePath = new File(releaseStoreFile)
    if (absolutePath.isAbsolute() && absolutePath.exists()) {
        releaseStoreFileRef = absolutePath
    } else if (moduleRelative.exists()) {
        releaseStoreFileRef = moduleRelative
    } else if (moduleNormalized.exists()) {
        releaseStoreFileRef = moduleNormalized
    } else {
        releaseStoreFileRef = rootRelative
    }
}

android {
    namespace = "br.com.finmemory.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "br.com.finmemory.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (releaseStoreFileRef) {
                storeFile releaseStoreFileRef
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (releaseStoreFileRef && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                signingConfig signingConfigs.release
            } else {
                logger.warn("Release signing is not configured. Configure android/keystore.properties or FM_UPLOAD_* env vars.")
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
